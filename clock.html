<!DOCTYPE html>
<html>
<body>

<h1 id="clock"></h1>

<script>
function showTime() {
  var now = new Date();

  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();

  if (h < 10) {
    h = "0" + h;
  }
  if (m < 10) {
    m = "0" + m;
  }
  if (s < 10) {
    s = "0" + s;
  }

  document.getElementById("clock").innerHTML =
    h + ":" + m + ":" + s;
}

setInterval(showTime, 1000);
</script>

</body>
</html>
